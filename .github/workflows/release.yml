name: Build release zip

# Builds the installable plugin zip and attaches it to a GitHub Release
# whenever a version tag (e.g. v1.1.0) is pushed.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Stage plugin files in the slug folder
        run: |
          mkdir -p build/daningers-smtp-for-amazon-ses
          cp daningers-smtp-for-amazon-ses.php readme.txt uninstall.php LICENSE build/daningers-smtp-for-amazon-ses/

      - name: Create the plugin zip
        run: |
          cd build
          zip -r ../daningers-smtp-for-amazon-ses.zip daningers-smtp-for-amazon-ses

      - name: Attach zip to the release
        uses: softprops/action-gh-release@v2
        with:
          files: daningers-smtp-for-amazon-ses.zip
